spring:
  application:
    name: inventory-platform
  datasource:
    url: jdbc:h2:mem:inventory_platform;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: oxipur-inventory-platform
      expiration: 1h
      secret: ${APP_SECURITY_JWT_SECRET:change-this-dev-only-32-byte-minimum-secret}
