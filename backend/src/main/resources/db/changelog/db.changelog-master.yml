        - addForeignKeyConstraint:
            baseTableName: cylinders
            baseColumnNames: current_warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            constraintName: fk_cylinders_current_warehouse
  - changeSet:
      id: 007-seed-main-warehouse
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM warehouses WHERE code = 'PLANTA'
      changes:
        - insert:
            tableName: warehouses
            columns:
              - column:
                  name: code
                  value: PLANTA
              - column:
                  name: name
                  value: Planta
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP
