databaseChangeLog:
  - changeSet:
      id: 001-create-cylinders
      author: codex
      changes:
        - createTable:
            tableName: cylinders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: serial_number
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: capacity_m3
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: owner
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(12,2)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 002-add-cylinder-status
      author: codex
      changes:
        - addColumn:
            tableName: cylinders
            columns:
              - column:
                  name: status
                  type: VARCHAR(40)
                  defaultValue: AVAILABLE
                  constraints:
                    nullable: false
  - changeSet:
      id: 003-add-cylinder-owner-type
      author: codex
      changes:
        - addColumn:
            tableName: cylinders
            columns:
              - column:
                  name: owner_type
                  type: VARCHAR(40)
                  defaultValue: COMPANY
                  constraints:
                    nullable: false
  - changeSet:
      id: 004-create-products
      author: codex
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 005-create-warehouses
      author: codex
      changes:
        - createTable:
            tableName: warehouses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 006-add-cylinder-current-location
      author: codex
      changes:
        - addColumn:
            tableName: cylinders
            columns:
              - column:
                  name: current_location_type
                  type: VARCHAR(40)
              - column:
                  name: current_warehouse_id
