      author: codex
      changes:
        - addColumn:
            tableName: sales_note_delivered_cylinders
            columns:
              - column:
                  name: capacity_m3
                  type: DECIMAL(10,2)
        - addColumn:
            tableName: sales_note_collected_cylinders
            columns:
              - column:
                  name: capacity_m3
                  type: DECIMAL(10,2)
        - sql:
            sql: UPDATE sales_note_delivered_cylinders d SET capacity_m3 = (SELECT c.capacity_m3 FROM cylinders c WHERE c.id = d.cylinder_id) WHERE capacity_m3 IS NULL
        - sql:
            sql: UPDATE sales_note_collected_cylinders c SET capacity_m3 = (SELECT cy.capacity_m3 FROM cylinders cy WHERE cy.id = c.cylinder_id) WHERE capacity_m3 IS NULL
        - addNotNullConstraint:
            tableName: sales_note_delivered_cylinders
            columnName: capacity_m3
            columnDataType: DECIMAL(10,2)
        - addNotNullConstraint:
            tableName: sales_note_collected_cylinders
            columnName: capacity_m3
            columnDataType: DECIMAL(10,2)
