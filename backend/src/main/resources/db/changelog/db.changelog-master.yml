                  defaultValue: REGISTERED
                  constraints:
                    nullable: false
              - column:
                  name: source_type
                  type: VARCHAR(40)
                  defaultValue: USER
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
